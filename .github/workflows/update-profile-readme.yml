permissions:
  contents: write

name: Update README timestamp
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update and commit README
        run: |
          TIMESTAMP=$(date -u "+%A, %B %d, %Y at %H:%M UTC")
          sed -i "s|<!--TIMESTAMP-->.*|<!--TIMESTAMP-->${TIMESTAMP}|g" README.md
          git config user.name "ronnienter"
          git config user.email "ronnienter@gmail.com"
          git diff --quiet || (git add README.md && git commit -m "🔄 README updated: ${TIMESTAMP}" && git push)